volumes:
  pg_data_production:
  static:

services:
  db:
    image: postgres:13.10
    volumes:
      - pg_data_production:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  backend:
    image: ${DOCKER_USERNAME}/taski_backend
    depends_on:
      - db
    volumes:
      - static:/backend_static
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      SECRET_KEY: ${SECRET_KEY}
  frontend:
    image: ${DOCKER_USERNAME}/taski_frontend
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static:/frontend_static
  gateway:
    image: ${DOCKER_USERNAME}/taski_gateway
    depends_on:
      - backend
      - frontend
    volumes:
      - static:/staticfiles
    ports:
      - 8000:80
